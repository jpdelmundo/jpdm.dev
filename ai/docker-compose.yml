services:
  litellm:
    image: ghcr.io/berriai/litellm:v1.80.15-stable
    container_name: litellm
    ports:
      - "4000:4000"
    environment:
      # Required
      - DEEPSEEK_API_KEY=${DEEPSEEK_API_KEY}
      - LITELLM_MASTER_KEY=${LITELLM_MASTER_KEY}
      - DATABASE_URL=${DATABASE_URL}

      # Optional but useful
      - LITELLM_LOG=INFO
    command: >
      --config /app/config.yml
      --port 4000
    volumes:
      - ./litellm.yml:/app/config.yml
    networks:
      - app-net
    restart: unless-stopped

networks:
  app-net:
    external: true