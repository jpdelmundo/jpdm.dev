name: Deploy
on:
  push:
    branches:
      - master

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Bootstrap app dir and deploy
        uses: appleboy/ssh-action@v1.2.5
        with:
          username: deploy
          host: ${{ vars.SSH_HOST }}
          port: ${{ vars.SSH_PORT }}
          key: ${{ secrets.SSH_KEY }}
          script: |
            APP_DIR="/home/deploy/jpdm.dev"
            GITEA_TOKEN="${{ secrets.__GITEA_TOKEN }}"
            GITEA_USERNAME="${{ secrets.__GITEA_USERNAME }}"            
            REPO_URL="https://$GITEA_USERNAME:$GITEA_TOKEN@git.jpdm.dev/jp/jpdm.dev.git"
            ENV_CONTENT="${{ secrets.ENV_CONTENT_PROD }}"

            echo "Starting..."
            mkdir -p "$APP_DIR"
            cd "$APP_DIR"

            echo "$ENV_CONTENT" > .env
            chmod 600 .env
            chown deploy:deploy .env

            #check if repo already checked out
            if [ ! -d ".git" ]; then
              echo "Cloning repo..."
              git clone -b master "$REPO_URL" .
              echo "Repo cloned."
            else
              #repo exists
              echo "Pulling latest changes..."
              git fetch origin
              git checkout master
              echo "Code updated."
            fi

            echo "Building and starting containers..."
            docker compose up -d --build

            echo "Checking status..."
            sleep 3
            docker ps --format "table {{.Names}}\t{{.Status}}\t{{.Ports}}"

            echo "Deployment completed."
