map $http_upgrade $connection_upgrade {
    default upgrade;
    ''      close;
}

server {
    listen 443 ssl;
    server_name jpdm.dev www.jpdm.dev;

    #/api/
    location /api/ {
        client_max_body_size 25M;
        proxy_pass http://[::1]:3000;
        
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Original-URI $request_uri;

        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $connection_upgrade;
    }

    #/usercontent/
    location /usercontent/ {
        proxy_pass http://[::1]:3000;
        
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Original-URI $request_uri;

        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $connection_upgrade;

        #proxy_cache_valid 200 1h;
        #add_header Cache-Control "public";
    }

    #/posts/<uuid regex>
    location ~ ^/posts/[0-9a-f-]+(?:/.+)?$ {
        rewrite ^/posts/(.+)$ /api/posts/og/$1 break;
        proxy_pass http://[::1]:3000;
        
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Original-URI $request_uri;

        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $connection_upgrade;
    }

    #/og/image/<uuid regex>
    location ~ ^/og/image/[0-9a-f-]+$ {
        rewrite ^/og/image/(.+)$ /api/posts/og/image/$1 break;
        proxy_pass http://[::1]:3000;
        
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Original-URI $request_uri;

        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $connection_upgrade;
    }

    location / {
        root /srv/www/frontend;
        try_files $uri $uri/ /index.html;
    }

    ssl_certificate /etc/letsencrypt/live/jpdm.dev/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/jpdm.dev/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;
}

server {
    listen 80;
    server_name jpdm.dev www.jpdm.dev;
    return 301 https://$host$request_uri;
}