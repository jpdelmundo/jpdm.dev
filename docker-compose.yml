services:
  # frontend:
  #   container_name: frontend
  #   build:
  #     context: .
  #     dockerfile: frontend/Dockerfile
  #   ports:
  #     - "${FRONTEND_PORT}:5173"
  #   depends_on:
  #     - backend
  #   restart: unless-stopped
  #   networks:
  #     - app-net
  
  backend:
    container_name: backend
    build:
      context: .
      dockerfile: Dockerfile
    volumes:
      - ./backend/usercontent:/app/backend/usercontent
      - ./backend/logs:/app/backend/logs
      - /srv/www/frontend:/mnt/frontend-out
    env_file:
      - .env
    ports:
      - "${BACKEND_PORT}:3000"
    depends_on:
      db:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - app-net

  db:
    image: postgres:16-alpine
    container_name: db
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_HOST_AUTH_METHOD: scram-sha-256
    volumes:
      - db_data:/var/lib/postgresql/data
    # ports: #expose if necessary, otherwise just remove
    #   - "${POSTGRES_PORT}:5432"
    ports:
      - "${POSTGRES_PORT}:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 1m30s
      timeout: 30s
      retries: 5
      start_period: 30s
    networks:
      - app-net
    restart: unless-stopped

  litellm:
    build:
      context: .
      dockerfile: Dockerfile.litellm
    container_name: litellm
    expose:
      - "4000"
    env_file:
      - .env
    environment:
      DATABASE_URL: postgres://${POSTGRES_USER}:${POSTGRES_PASSWORD}@db:${POSTGRES_PORT}/litellm
      LITELLM_LOG: INFO
    volumes:
      - ./litellm-init.sh:/app/litellm-init.sh
      - ./litellm.yml:/app/config.yml
    entrypoint: sh
    command: >
      -c "docker/prod_entrypoint.sh --config /app/config.yml --port 4000 &
          sh /app/litellm-init.sh &&
          wait"
    networks:
      - app-net
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy

networks:
  app-net:

volumes:
  db_data: