services:
  frontend:
    container_name: frontend
    build:
      context: .
      dockerfile: Dockerfile
      target: frontend
    env_file:
      - .env
    ports:
      - "${FRONTEND_PORT:-8080}:80"
    depends_on:
      - backend
    restart: unless-stopped
    networks:
      - app-net
  backend:
    container_name: backend
    build:
      context: .
      dockerfile: Dockerfile
      target: production
    volumes:
      - ./backend/usercontent:/app/backend/usercontent
      - ./backend/logs:/app/backend/logs
    env_file:
      - .env
    ports:
      - "${BACKEND_PORT:-3000}:3000"
    depends_on:
      db:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - app-net

  db:
    image: postgres:16-alpine
    container_name: db
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-Postgres1@}
      POSTGRES_DB: ${POSTGRES_DB:-jpdm}
      POSTGRES_HOST_AUTH_METHOD: scram-sha-256
    volumes:
      - db_data:/var/lib/postgresql/data
    # ports: #expose if necessary, otherwise just remove
    #   - "${POSTGRES_PORT:-5432}:5432"
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres} -d ${POSTGRES_DB:-jpdm}"]
      interval: 1m30s
      timeout: 30s
      retries: 5
      start_period: 30s
    networks:
      - app-net
    restart: unless-stopped

networks:
  app-net:

volumes:
  db_data: